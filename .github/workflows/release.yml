name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-build all targets
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: ./.sdlc/cross

      - name: Package
        run: |
          mkdir -p artifacts
          cd dist
          for f in paq-*; do
            bin="paq"
            suffix="${f#paq-}"          # es. linux-amd64 / windows-amd64.exe
            case "$f" in
              *.exe) bin="paq.exe"; suffix="${suffix%.exe}" ;;
            esac
            cp "$f" "$bin"
            zip "../artifacts/paq-${GITHUB_REF_NAME}-${suffix}.zip" "$bin"
            rm "$bin"
          done

      - name: Checksums
        run: |
          cd artifacts
          sha256sum paq-*.zip > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/SHA256SUMS
          generate_release_notes: true
