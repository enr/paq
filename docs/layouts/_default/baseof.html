<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en-us" }}">
{{ partial "head.html" . }}
<body class="{{ if .IsHome }}is-home{{ else }}is-doc{{ end }}">
  <div class="grain" aria-hidden="true"></div>
  {{ partial "header.html" . }}
  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "js/site.js" | relURL }}" defer></script>
</body>
</html>
