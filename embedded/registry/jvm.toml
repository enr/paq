[jdk]
backend = "url"
# Endpoint "latest": serves the newest build of a major (e.g. jdk-26), so
# "version" is the major number (26, 21, ...).
source = "https://download.oracle.com/java/{{version}}/latest/jdk-{{version}}_{{os}}-{{arch}}_bin.tar.gz"
archive = "tar.gz"
strip_components = 1
# Version installed by default (when "version" is absent from the manifest).
default_version = "26"

[jdk.os]
darwin = "macos"

[jdk.arch]
amd64 = "x64"
arm64 = "aarch64"

[jdk.darwin]
strip_components = 0
subdir = "*/Contents/Home"

[jdk.verify]
# Oracle publishes the checksum as a separate file (hash only) next to the asset.
sha256_asset = "{{asset}}.sha256"

[maven]
backend = "url"
source = "https://archive.apache.org/dist/maven/maven-{{version_major}}/{{version}}/binaries/apache-maven-{{version}}-bin.zip"
archive = "zip"
strip_components = 1
# Version installed by default (when "version" is absent from the manifest): stable channel.
default_version = "3.9.16"
# With version = "latest" the version is resolved from the official Arch repos
# (package "maven") and downloaded from the Apache archive.
latest_strategy = "arch-linux"
arch_pkg = "maven"

[maven.verify]
sha512_asset = "{{asset}}.sha512"
