# Eclipse Temurin (Adoptium) JDK, one recipe per major version.
# The asset uses the build number ({{version_build}}, e.g. the "10" in 21.0.11+10),
# extracted from the GitHub tag. Verifies SHA256 via the .sha256.txt file published
# alongside each asset. linux/macOS only: on Windows the asset is a .zip.

[temurin-26]
backend = "github"
repo = "adoptium/temurin26-binaries"
asset = "OpenJDK{{version_major}}U-jdk_{{arch}}_{{os}}_hotspot_{{version}}_{{version_build}}.tar.gz"
archive = "tar.gz"
strip_components = 1

[temurin-26.os]
darwin = "mac"

[temurin-26.arch]
amd64 = "x64"
arm64 = "aarch64"

[temurin-26.verify]
sha256_asset = "{{asset}}.sha256.txt"

